name: Update HR dashboard data
on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/update-data.yml'
      - 'scripts/update-dashboard.mjs'
      - 'scripts/google-sheets.mjs'
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Recalculate dashboard aggregates
        env:
          MAIN_SHEET_ID: ${{ secrets.MAIN_SHEET_ID }}
          PEOPLE_SHEET_ID: ${{ secrets.PEOPLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: node scripts/update-dashboard.mjs
      - name: Publish changed data through GitHub Pages
        run: |
          if git diff --quiet -- data.js; then exit 0; fi
          git config user.name "hr-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.js
          git commit -m "Update HR dashboard data"
          git push
