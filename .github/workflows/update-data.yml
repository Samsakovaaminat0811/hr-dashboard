name: Update HR dashboard data
on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/update-data.yml'
      - 'scripts/update-dashboard.mjs'
      - 'scripts/google-sheets.mjs'
permissions:
  contents: read
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Recalculate dashboard aggregates
        env:
          MAIN_SHEET_ID: ${{ secrets.MAIN_SHEET_ID }}
          PEOPLE_SHEET_ID: 1bsbP6d1f8zHCzMIrSsFiXSrxa8EMXn_EX_kJ4oeW6is
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: node scripts/update-dashboard.mjs
      - name: Publish protected data to the HR hub
        env:
          HR_FTP_HOST: ${{ secrets.HR_FTP_HOST }}
          HR_FTP_USER: ${{ secrets.HR_FTP_USER }}
          HR_FTP_PASSWORD: ${{ secrets.HR_FTP_PASSWORD }}
        run: |
          {
            printf "<?php\nreturn <<<'JS'\n"
            cat data.js
            printf "\nJS;\n"
          } > data.payload.php
          curl --fail --silent --show-error --user "$HR_FTP_USER:$HR_FTP_PASSWORD" --upload-file data.payload.php "ftp://$HR_FTP_HOST/data.payload.php"
